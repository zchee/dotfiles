# -----------------------------------------------------------------------------
# kitty config
#
# - https://sw.kovidgoyal.net/kitty/conf.html
#
# -----------------------------------------------------------------------------

# Fonts

# MonoLisa
#     MonoLisa Thin (MonoLisaThin-Regular)
#     MonoLisa Thin Italic (MonoLisaThin-Italic)
#     MonoLisa ExtraLight (MonoLisaExtraLight-Regular)
#     MonoLisa ExtraLight Italic (MonoLisaExtraLight-Italic)
#     MonoLisa Light (MonoLisaLight-Regular)
#     MonoLisa Light Italic (MonoLisaLight-Italic)
#     MonoLisa Regular (MonoLisa-Regular)
#     MonoLisa Regular Italic (MonoLisa-RegularItalic)
#     MonoLisa Medium (MonoLisaMedium-Regular)
#     MonoLisa Medium Italic (MonoLisaMedium-Italic)
#     MonoLisa SemiBold (MonoLisaSemiBold-Regular)
#     MonoLisa SemiBold Italic (MonoLisaSemiBold-Italic)
#     MonoLisa Bold (MonoLisa-Bold)
#     MonoLisa Bold Italic (MonoLisa-BoldItalic)
#     MonoLisa ExtraBold (MonoLisaExtraBold-Regular)
#     MonoLisa ExtraBold Italic (MonoLisaExtraBold-Italic)
#     MonoLisa Black (MonoLisaBlack-Regular)
#     MonoLisa Black Italic (MonoLisaBlack-Italic)

font_family       MonoLisa Regular
italic_font       MonoLisa Regular Italic
bold_font         MonoLisa Black
bold_italic_font  MonoLisa Black Italic

# font_features MonoLisa-Regular          +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisa-RegularItalic    +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisaMedium-Regular    +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisaMedium-Italic     +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisaSemiBold-Regular  +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisaSemiBold-Italic   +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisa-Bold             +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisa-BoldItalic       +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisaExtraBold-Regular +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisaExtraBold-Italic  +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisaBlack-Regular     +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13
# font_features MonoLisaBlack-Italic      +zero +ss01 +ss04 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13

font_size 14.0

disable_ligatures never

modify_font underline_position     4
modify_font underline_thickness    115%
modify_font strikethrough_position 0px
modify_font cell_width             103%
modify_font cell_height            185%
modify_font baseline               0

# box_drawing_scale 0.005, 2, 3, 4

# thin-sparse, thin-dense, thick-sparse, thick-dense
undercurl_style thick-dense

# text_composition_strategy legacy
text_composition_strategy platform
# default:
# text_composition_strategy 1.7 30
# text_composition_strategy 10.0 20 

text_fg_override_threshold 0

cursor_shape block

cursor_beam_thickness 2.0

cursor_underline_thickness 2.0

cursor_blink_interval 0

cursor_stop_blinking_after 15.0

scrollback_indicator_opacity 0.2

shell_integration no-cursor

# -----------------------------------------------------------------------------
# Performance tuning

repaint_delay 1

input_delay 0

sync_to_monitor no

# -----------------------------------------------------------------------------
# OS specific tweaks
# macos_titlebar_color background

macos_option_as_alt yes

macos_hide_from_tasks yes

macos_quit_when_last_window_closed yes

macos_window_resizable yes

macos_colorspace displayp3

# macos_thicken_font 0
# macos_thicken_font 0.1
# macos_thicken_font 0.2
# macos_thicken_font 0.3
# macos_thicken_font 0.4
macos_thicken_font 0.5
# macos_thicken_font 0.6
# macos_thicken_font 0.7
# macos_thicken_font 0.75
# macos_thicken_font 0.85
# macos_thicken_font 1.0

macos_traditional_fullscreen no

# 'all', 'menubar', 'none', 'window'
macos_show_window_title_in none

macos_custom_beam_cursor no

# -----------------------------------------------------------------------------
# Scrollback

scrollback_lines 20000

scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

scrollback_pager_history_size 4000

wheel_scroll_multiplier 2.0

touch_scroll_multiplier 1.0

# -----------------------------------------------------------------------------
# Mouse

mouse_hide_wait 1.0

# open_url_modifiers super+shift

# open_url_with default

# url_prefixes http https file ftp

# copy_on_select no

strip_trailing_spaces always

# rectangle_select_modifiers ctrl+alt

# terminal_select_modifiers shift

# The modifiers to override mouse selection even when a terminal
# application has grabbed the mouse

# default: @-./_~?&=%+#
select_by_word_characters -./_~%+#

# click_interval -1.0

focus_follows_mouse no

# pointer_shape_when_grabbed arrow

# default_pointer_shape beam

# pointer_shape_when_dragging beam

# -----------------------------------------------------------------------------
# Terminal bell

enable_audio_bell no

visual_bell_duration 0.0

# window_alert_on_bell yes

# bell_on_tab yes

# command_on_bell none

# -----------------------------------------------------------------------------
# Window layout

remember_window_size  yes
# initial_window_width  640
# initial_window_height 400

# https://sw.kovidgoyal.net/kitty/index.html#layouts.
# enabled_layouts *
enabled_layouts all
# enabled_layouts horizontal

# window_resize_step_cells 2
# window_resize_step_lines 2

# window_border_width 0.5pt

# draw_minimal_borders yes

window_margin_width 1

single_window_margin_width -1

window_padding_width 0

# placement_strategy center

# active_border_color #cccccc

# inactive_border_color #cccccc

# bell_border_color #ff5a00

# inactive_text_alpha 1.0

# yen, no, titlebar-only, titlebar-and-corners
hide_window_decorations titlebar-and-corners

resize_debounce_time 0.1 0.5

resize_in_steps no

confirm_os_window_close 0

# -----------------------------------------------------------------------------
# Tab bar

# tab_bar_edge bottom

# tab_bar_margin_width 0.0

# tab_bar_style fade

# tab_bar_min_tabs 2

# tab_switch_strategy previous

# tab_fade 0.25 0.5 0.75 1

# tab_separator " ?"
tab_separator " |"

# tab_activity_symbol none

# tab_title_template "{title}"

# active_tab_title_template none

# tab_bar_background none

# -----------------------------------------------------------------------------
# Color scheme

background_opacity 1

background_image none

# background_image_layout tiled

# background_image_linear no

dynamic_background_opacity no

# background_tint 0.0

# dim_opacity 0.4
dim_opacity 0.75

# -----------------------------------------------------------------------------
# Advanced

shell /opt/homebrew/bin/zsh

editor nvim

close_on_child_death no

allow_remote_control yes

listen_on unix:/tmp/kitty.sock

# env
# env TERMINFO=/Applications/kitty.app/Contents/Resources/kitty/terminfo

term xterm-256color
# term xterm-kitty

update_check_interval 0

# https://sw.kovidgoyal.net/kitty/index.html#sessions
startup_session none

clipboard_control write-clipboard read-clipboard write-primary read-primary no-append

# allow_hyperlinks yes
 
# -----------------------------------------------------------------------------
# Include

include color.conf
include keybind.conf
include symbol_map.conf
